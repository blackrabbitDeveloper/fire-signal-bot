name: BRIS-v1 Signal Check

on:
  schedule:
    - cron: '0 21 * * 1-5'  # UTC 21:00 = EST 16:00 (KST 06:00)
  workflow_dispatch:  # 수동 실행

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-signal:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run signal check
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python signal_checker.py

      - name: Commit state changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signal_state.json
          # signal_log.csv는 커밋하지 않음 (gitignore)
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            STATE=$(python -c "import json; print(json.load(open('signal_state.json'))['state'])")
            DATE=$(python -c "import json; print(json.load(open('signal_state.json'))['last_check'])")
            ACTION=$(python -c "import json; print(json.load(open('signal_state.json')).get('last_action','') or '')")
            PREV=$(git show HEAD:signal_state.json 2>/dev/null | python -c "import json,sys; d=json.load(sys.stdin); print(d.get('state',''))" 2>/dev/null || echo "")

            if [ "$ACTION" = "EMERGENCY_EXIT" ]; then
              git commit -m "D3 Emergency: Off (${DATE})"
            elif [ "$ACTION" = "GOLDEN_CROSS_ENTRY" ]; then
              git commit -m "GCE Entry: On (${DATE})"
            elif [ "$STATE" != "$PREV" ] && [ -n "$PREV" ]; then
              git commit -m "Signal: ${STATE} (${DATE})"
            else
              git commit -m "Check: ${STATE}, no change (${DATE})"
            fi
            git push
          fi
